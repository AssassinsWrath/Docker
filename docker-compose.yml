---
version: "1.0"
services:
###############################################################
# Dashy
###############################################################

  dashy:
    image: lissy93/dashy
    container_name: dashy
    volumes:
      - /container_data/dashy/dashy-conf.yml:/app/user-data/conf.yml
    ports:
      - 8090:8080
    networks:
      - reverse_proxy
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ['CMD', 'node', '/app/services/healthcheck']
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashy.tls=true"
      - "traefik.http.routers.dashy.entrypoints=websecure"
      - "traefik.http.routers.dashy.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.dashy.rule=Host(`home.willg.link`)"

###############################################################
# AudioBookShelf
###############################################################
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - "13378:13378"
    volumes:
      - audiobookshelfconfig:/config
      - audiobookshelfmetadata:/metadata
      - audiobookshelfaudiobooks:/audiobooks
      - audiobookshelfpodcasts:/podcasts
    restart: unless-stopped
    labels:
    - "traefik.enable=true"
    - "traefik.http.routers.audiobookshelf.tls=true"
    - "traefik.http.routers.audiobookshelf.entrypoints=websecure"
    - "traefik.http.routers.audiobookshelf.tls.certresolver=letsencryptresolver"
    - "traefik.http.routers.audiobookshelf.rule=Host(`audiobookshelf.willg.link`)"
    - "traefik.http.routers.audiobookshelf.service=audiobookshelf-docker"
    networks:
      - reverse_proxy

