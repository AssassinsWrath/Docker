###############################################################
# Minecraft (Java)
###############################################################

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      MEMORY: "4G"
      TYPE: "VANILLA"
      VERSION: "LATEST"
    volumes:
      - minecraft:/data
    networks:
      - reverse_proxy
    restart: unless-stopped
    labels:
    - "traefik.enable=true"
    - "traefik.http.routers.minecraft.tls=true"
    - "traefik.http.routers.minecraft.entrypoints=websecure"
    - "traefik.http.routers.minecraft.tls.certresolver=letsencryptresolver"
    - "traefik.http.routers.minecraft.rule=Host(`minecraft.willg.link`)"
    - "traefik.http.routers.minecraft.service=minecraft-docker"


###############################################################
# Minecraft (Bedrock) - set by AssassinsWrath - need to test
###############################################################

  bedrock-server:
    image: itzg/minecraft-bedrock-server:latest
    container_name: bedrock-server
    ports:
      - "19132:19132/udp" #if testing fails, it  maybe due to the /udp part
    environment:
      EULA: "TRUE"
      MEMORY: "4G"
      #TYPE: "VANILLA"
      VERSION: "LATEST"
      SERVER_NAME=${SERVER_NAME}
      SERVER_PORT=${ERVER_PORT}
      SERVER_PORT_V6=${SERVER_PORT_V6}
      GAMEMODE=${GAMEMODE}
      DIFFICULTY=${DIFFICULTY}
      ALLOW_CHEATS=${ALLOW_CHEATS}
      MAX_PLAYERS=${MAX_PLAYERS}
      ONLINE_MODE=${ONLINE_MODE}
      VIEW_DISTANCE=${VIEW_DISTANCE}
      TICK_DISTANCE=${TICK_DISTANCE}
      MAX_THREADS=${MAX_THREADS}
      LEVEL_NAME=${LEVEL_NAME}
      LEVEL_SEED=${LEVEL_SEED}
      DEFAULT_PLAYER_PERMISSION_LEVEL=${DEFAULT_PLAYER_PERMISSION_LEVEL}
      TEXTUREPACK_REQUIRED=${TEXTUREPACK_REQUIRED}
    volumes:
      - bedrock-server:/data
    networks:
      - reverse_proxy
    restart: unless-stopped
    labels:
    - "traefik.enable=true"
    - "traefik.http.routers.bedrock-server.tls=true"
    - "traefik.http.routers.bedrock-server.entrypoints=websecure"
    - "traefik.http.routers.bedrock-server.tls.certresolver=letsencryptresolver"
    - "traefik.http.routers.bedrock-server.rule=Host(`bedrock-server.willg.link`)"
    - "traefik.http.routers.bedrock-server.service=bedrock-server-docker"

###############################################################
# Media Stack
###############################################################

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - sabnzbdconfig:/config
      - downloads:/downloads
    ports:
      - 8079:8079
    networks:
      - reverse_proxy
    restart: always

  sonarr:
    container_name: sonarr
    image: linuxserver/sonarr:latest
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - sonarrconfig:/config
      - tv:/TV
      - downloads:/downloads
    ports:
      - 8989:8989
    networks:
      - reverse_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.willg.link`)"
      - "traefik.http.routers.sonarr.service=sonarr-docker"
  radarr:
    container_name: radarr
    image: linuxserver/radarr:latest
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=NZ
    volumes:
      - radarrconfig:/config
      - movies:/Movies
      - downloads:/downloads
    ports:
      - 7878:7878
    networks:
      - reverse_proxy

  plex:
    container_name: plex
    image: plexinc/pms-docker:latest
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=NZ
    volumes:
      - plexconfig:/config
      - plexconfig:/transcode
      - tv:/tv
      - movies:/movies
    ports:
      -  32400:32400
      -  5353:5353/udp
      -  8324:8324
      -  32410:32410/udp
      -  32412:32412/udp
      -  32413:32413/udp
      -  32414:32414/udp
      -  32469:32469
    networks:
      - reverse_proxy

###############################################################
# Portainer
###############################################################
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9443:9443"
      - "9000:9000"
    networks:
      - reverse_proxy
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "portainer_data:/data"
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.portainer.rule=Host(`portainer.willg.link`)"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

###############################################################
# Traefik
###############################################################

  traefik:
    container_name: traefik
    image: traefik:latest
    restart: always
    command:
      - --entrypoints.web.address=:80
      - --api
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.domains[0].main=${DOMAINNAME}
      - --entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAINNAME}
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --certificatesresolvers.letsencryptresolver.acme.dnschallenge=true
      - --certificatesresolvers.letsencryptresolver.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencryptresolver.acme.email=${EMAIL}
      - --certificatesresolvers.letsencryptresolver.acme.storage=/acme.json
      - --log.level=info
      - --providers.file.filename=/dynamic.yml
    ports:
      - 80:80
      - 443:443
    networks:
      - reverse_proxy
    environment:
      - CF_API_EMAIL=${EMAIL}
      - CF_API_KEY=${KEY}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${TRAEFIK_DIR}/acme.json:/acme.json
      - /container_data/traefik/dynamic.yml:/dynamic.yml:ro
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.admin.basicauth.users=${HTTP_BASIC_USER}:${HTTP_BASIC_PWD}
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.rule=Host(`${DOMAINNAME}`)
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.tls.certresolver=letsencryptresolver


###############################################################
# Maintainaar
###############################################################
  maintainerr:
    image: ghcr.io/jorenn92/maintainerr:latest
    container_name: maintainerr
    user: 1000:1000
    volumes:
      - maintainaar_config:/opt/data
    environment:
      - TZ=NZ
    networks:
      - reverse_proxy
    ports:
        - 6246:6246
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maintainaar.rule=Host(`maintainaar.willg.link`)"
      - "traefik.http.routers.maintainaar.entrypoints=websecure"
      - "traefik.http.routers.maintainaar.tls=true"
      - "traefik.http.routers.maintainaar.tls.certresolver=letsencryptresolver"

###############################################################
